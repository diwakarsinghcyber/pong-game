<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>PONG GAME</h1>
        <div class="scoreboard">
            <div class="score-left">Player: <span id="leftScore">0</span></div>
            <div class="score-right">Computer: <span id="rightScore">0</span></div>
        </div>
        <canvas id="pong" width="800" height="400"></canvas>
        <div class="instructions">
            <p>Use <strong>Arrow Keys (↑↓)</strong> or <strong>Mouse</strong> to control left paddle</p>
            <p>Computer controls right paddle</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
